name: anote
description: "Your AI Second Brain."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: any
  go_router: any
  google_fonts: any
  cupertino_icons: any
  flutter_animate: any
  shared_preferences: any
  path_provider: any
  path: any
  uuid: any
  intl: any
  equatable: any
  image_picker: ^1.1.2
  speech_to_text: ^6.6.1
  file_picker: ^8.0.0
  open_filex: ^4.5.0
  audio_waveforms: ^1.0.5
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  cryptography: ^2.7.0
  encrypt: ^5.0.3
  local_auth: ^2.1.8
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  riverpod_annotation: ^2.3.3
  archive: ^3.4.9
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  flutter_launcher_icons: any
  build_runner: ^2.4.7
  drift_dev: ^2.14.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
