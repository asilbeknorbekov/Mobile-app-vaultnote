name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          cache: true

      - name: Generate Android Project
        run: flutter create --org com.asilbek.vaultnote --project-name vaultnote .

      - name: Fix Android SDK Version
        run: |
          # Bump compileSdk to 36 to satisfy all plugin requirements
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/' android/app/build.gradle
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 36/' android/app/build.gradle
          sed -i 's/compileSdk flutter.compileSdkVersion/compileSdk 36/' android/app/build.gradle
          # Also fix .kts files if present
          find android -name "*.gradle.kts" -exec sed -i 's/flutter.compileSdkVersion/36/' {} +
          find android -name "*.gradle" -exec sed -i 's/flutter.compileSdkVersion/36/' {} +

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vaultnote-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
